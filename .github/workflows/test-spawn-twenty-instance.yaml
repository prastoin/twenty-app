name: Test Spawn Twenty Instance

on:
  workflow_dispatch:
    inputs:
      twenty-version:
        description: 'Docker Hub image tag (e.g., latest, v0.40.0). Leave empty when using twenty-ref.'
        required: false
        default: ''
      twenty-ref:
        description: 'Git branch, tag, or SHA to build from source. Leave empty to use Docker Hub.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  spawn-and-healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Spawn Twenty instance
        id: twenty
        uses: twentyhq/twenty/.github/actions/spawn-twenty-instance@feat-ci
        with:
          twenty-version: ${{ github.event.inputs.twenty-version }}
          twenty-ref: ${{ github.event.inputs.twenty-ref }}

      - name: Health check
        run: |
          echo "Server URL: ${{ steps.twenty.outputs.server-url }}"
          curl -f ${{ steps.twenty.outputs.server-url }}/healthz
          echo ""
          echo "Twenty instance is healthy!"

      - name: Verify image origin
        run: |
          SERVER_IMAGE=$(docker inspect twenty-server-1 --format='{{.Config.Image}}')
          echo "Server image: $SERVER_IMAGE"

          if [ -n "${{ github.event.inputs.twenty-ref }}" ]; then
            echo "Expected: locally built image"
            if echo "$SERVER_IMAGE" | grep -q "twentycrm/twenty:"; then
              echo "::error::Server is using a Docker Hub image, expected a locally built one"
              exit 1
            fi
            echo "Confirmed: image was built from source"
          else
            echo "Expected: Docker Hub image with tag '${{ github.event.inputs.twenty-version || 'latest' }}'"
            if ! echo "$SERVER_IMAGE" | grep -q "twentycrm/twenty:"; then
              echo "::error::Server is not using a Docker Hub image"
              exit 1
            fi
            echo "Confirmed: image was pulled from Docker Hub"
          fi
