name: Test Spawn Twenty Instance

on:
  workflow_dispatch:
    inputs:
      twenty-version:
        description: 'Docker Hub image tag (e.g., latest, v0.40.0). Leave empty when using twenty-ref.'
        required: false
        default: ''
      twenty-ref:
        description: 'Git branch, tag, or SHA to build from source. Leave empty to use Docker Hub.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  spawn-and-healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Spawn Twenty instance
        id: twenty
        uses: twentyhq/twenty/.github/actions/spawn-twenty-instance@feat-ci
        with:
          twenty-version: ${{ github.event.inputs.twenty-version }}
          twenty-ref: ${{ github.event.inputs.twenty-ref }}

      - name: Health check
        run: |
          echo "Server URL: ${{ steps.twenty.outputs.server-url }}"
          curl -f ${{ steps.twenty.outputs.server-url }}/healthz
          echo ""
          echo "Twenty instance is healthy!"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: hello-world
        run: yarn install --immutable

      - name: Run integration tests
        working-directory: hello-world
        env:
          TWENTY_API_URL: ${{ steps.twenty.outputs.server-url }}
          TWENTY_API_KEY: ${{ steps.twenty.outputs.access-token }}
        run: yarn test:integration
